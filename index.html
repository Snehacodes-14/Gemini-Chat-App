<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat & Google Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            border: none;
            background: white;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: #f8f9ff;
        }

        .tab-button:hover {
            background: #f8f9ff;
        }

        .tab-content {
            padding: 40px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .google-search {
            text-align: center;
        }

        .google-search input {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .google-search input:focus {
            outline: none;
            border-color: #667eea;
        }

        .google-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .google-buttons button {
            padding: 12px 30px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .google-buttons button:hover {
            background: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
        }

        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f8f9fa;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: 20%;
            margin-right: 10px;
            text-align: right;
        }

        .message.bot {
            background: white;
            color: #333;
            margin-right: 20%;
            margin-left: 10px;
            border: 1px solid #e0e0e0;
        }

        .message.error {
            background: #fee;
            color: #c33;
            margin-left: 10px;
            margin-right: 10px;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .message.user {
                margin-left: 10%;
            }

            .message.bot {
                margin-right: 10%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Search Assistant</h1>
            <p>Chat with Gemini AI or Search Google</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('gemini')">💬 Gemini Chat</button>
            <button class="tab-button" onclick="switchTab('google')">🔎 Google Search</button>
        </div>

        <!-- Gemini Chat Tab -->
        <div id="gemini" class="tab-content active">
            <div class="chat-container">
                <div class="messages" id="messages"></div>
                <div class="search-box">
                    <input type="text" id="chatInput" placeholder="Ask me anything..." />
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <!-- Google Search Tab -->
        <div id="google" class="tab-content">
            <div class="google-search">
                <input type="text" id="googleInput" placeholder="Search Google..." />
                <div class="google-buttons">
                    <button onclick="googleSearch()">Google Search</button>
                    <button onclick="googleLucky()">I'm Feeling Lucky</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    addMessage('Error: ' + data.error, 'error');
                } else {
                    addMessage(data.response, 'bot');
                }
            })
            .catch(err => addMessage('Error: ' + err.message, 'error'));
        }

        function addMessage(text, type) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function googleSearch() {
            const query = document.getElementById('googleInput').value.trim();
            if (query) {
                window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
            }
        }

        function googleLucky() {
            const query = document.getElementById('googleInput').value.trim();
            if (query) {
                window.open('https://www.google.com/search?q=' + encodeURIComponent(query) + '&btnI=1', '_blank');
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('googleInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') googleSearch();
        });
    </script>
</body>
</html>
